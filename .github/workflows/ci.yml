name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Clean Derived Data
        run: rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Setup Swift
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: "5.9"

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve dependencies
        run: |
          cd packages/NearJsonRpcTypes && swift package resolve
          cd ../NearJsonRpcClient && swift package resolve

      - name: Test packages
        run: |
          cd packages/NearJsonRpcTypes && swift test
          cd ../NearJsonRpcClient && swift test

      - name: Build examples
        run: |
          cd examples/basic-usage && swift build
          cd ../advanced-usage && swift build
          cd ../types-usage && swift build

      - name: Build packages
        run: |
          cd packages/NearJsonRpcTypes && swift build
          cd ../NearJsonRpcClient && swift build
